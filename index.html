            const renderPage = () => {
                switch(activePage) {
                    case 'home': return <HomePage onNavigate={setActivePage} />;
                    case 'about': return <AboutPage />;
                    case 'services': return <ServicesPage />;
                    case 'testimonials': return <TestimonialsPage />;
                    case 'contact': return <ContactPage />;
                    default: return <HomePage onNavigate={setActivePage} />;
                }
            };

            return (
                <div className={`min-h-screen transition-opacity duration-700 ${isReady ? 'opacity-100' : 'opacity-0'}`}>
                    <Navbar activePage={activePage} setActivePage={setActivePage} />
                    <main>
                        {renderPage()}
                    </main>
                    <Footer />
                    
                    {/* Botón Flotante de WhatsApp */}
                    <button 
                        onClick={() => window.open('https://wa.me/1234567890', '_blank')}
                        className="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-50 w-14 h-14 md:w-16 md:h-16 bg-emerald-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all active:scale-95 hover:shadow-emerald-500/40"
                    >
                        <Icon name="message-circle" className="w-7 h-7 md:w-8 md:h-8" />
                    </button>
                </div>
            );
        }

        // Renderizado con manejo de errores
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            console.error("Error al renderizar:", err);
            document.getElementById('loading-screen').innerHTML = `
                <div class="p-10 text-center">
                    <p class="text-red-600 font-bold mb-4">Error al cargar la aplicación.</p>
                    <p class="text-stone-500 text-sm">Por favor, intenta recargar la página.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
